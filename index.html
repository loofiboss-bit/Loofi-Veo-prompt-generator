<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veo Prompt Generator</title>
    <link rel="stylesheet" href="./src/shared/styles/tokens.css" />
    <link rel="stylesheet" href="./src/shared/styles/animations.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#22d3ee" />
    <script>
      try {
        const savedTheme = localStorage.getItem('veo-theme');
        const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        if (savedTheme === 'light' || (!savedTheme && prefersLight)) {
          document.body.classList.add('light');
        }
      } catch (e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="./src/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Use relative path and explicit scope for correct origin handling
          navigator.serviceWorker
            .register('./sw.js', { scope: './' })
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch((error) => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
  </body>
</html>
