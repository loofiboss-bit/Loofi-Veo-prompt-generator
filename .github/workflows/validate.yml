name: Validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Lint (strict)
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Format check
        run: npm run format:check

      - name: Build check
        run: npm run build
