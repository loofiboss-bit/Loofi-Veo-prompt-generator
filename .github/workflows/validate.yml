name: Validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  governance:
    name: AI Governance Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate agent configuration
        run: bash scripts/validate-agent-config.sh

      - name: Check agent config drift
        run: bash scripts/generate-agent-configs.sh --check

      - name: Check MCP config drift
        run: bash scripts/sync-mcp-configs.sh --check

  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    needs: governance

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Security audit
        run: |
          if [ -f ".audit-allowlist.json" ]; then
            echo "Allowlist found — checking exceptions"
            npm audit --audit-level=high 2>&1 || {
              AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
              echo "$AUDIT_JSON" | node -e "
                const fs = require('fs');
                const allowlist = JSON.parse(fs.readFileSync('.audit-allowlist.json','utf8'));
                const ids = new Set(allowlist.allowedAdvisories.map(a => String(a.id)));
                const now = new Date();
                const expired = allowlist.allowedAdvisories.filter(a => a.expires && new Date(a.expires) < now);
                if (expired.length) { console.error('Expired allowlist entries:', expired.map(a=>a.id)); process.exit(1); }
                let data=''; process.stdin.on('data',d=>data+=d);
                process.stdin.on('end',()=>{
                  try {
                    const audit=JSON.parse(data);
                    const vulns=Object.values(audit.vulnerabilities||{}).filter(v=>v.severity==='high'||v.severity==='critical');
                    const unallowed=vulns.filter(v=>!ids.has(String(v.via?.[0]?.source||'')));
                    if(unallowed.length){console.error('Unallowed vulnerabilities:',unallowed.map(v=>v.name));process.exit(1);}
                    console.log('All high/critical advisories are allowlisted');
                  } catch(e){process.exit(1);}
                });
              " || { echo "::error::Security audit failed — unallowed vulnerabilities found"; exit 1; }
            }
          else
            npm audit --audit-level=high
          fi
        shell: bash

      - name: Lint (strict)
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage gates
        run: npm run test:ci

      - name: Format check
        run: npm run format:check

      - name: Build check
        run: npm run build

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E smoke tests
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-report
          path: test-results/
          retention-days: 7
