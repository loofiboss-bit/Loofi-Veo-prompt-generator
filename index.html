<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veo Prompt Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#22d3ee" />
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.22.0"
  }
}
</script>
<style>
  body {
    background-color: #020617; /* slate-950 */
    background-image:
      radial-gradient(circle at 15% 25%, hsla(210, 50%, 20%, 0.7), transparent 40%),
      radial-gradient(circle at 85% 65%, hsla(180, 40%, 15%, 0.6), transparent 50%),
      radial-gradient(circle at 50% 90%, hsla(240, 30%, 22%, 0.5), transparent 60%);
    background-attachment: fixed;
    color: #f1f5f9; /* slate-100 */
  }
  @keyframes flash-border {
    0% { border-color: #1e293b; } /* slate-800 */
    50% { border-color: #22d3ee; } /* cyan-400 */
    100% { border-color: #1e293b; } /* slate-800 */
  }
  .animate-flash-border {
    animation: flash-border 0.6s ease-in-out;
  }
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(1rem);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.5s ease-out forwards;
  }
  @keyframes text-fade-in {
    from { opacity: 0; transform: translateY(0.5rem); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-text-fade-in {
      animation: text-fade-in 0.4s ease-out;
  }

  /* --- Light Theme --- */
  body.light {
    background-color: #f1f5f9; /* slate-100 */
    background-image: none;
    color: #0f172a; /* slate-900 */
  }
  .light .bg-slate-950 { background-color: #f8fafc; /* slate-50 */ }
  .light .bg-slate-900\/60 { background-color: rgba(255, 255, 255, 0.7); }
  .light .bg-slate-900\/70 { background-color: rgba(248, 250, 252, 0.8); }
  .light .bg-slate-900\/40 { background-color: #ffffff; }
  .light .text-white, .light .text-slate-100 { color: #1e293b; /* slate-800 */ }
  .light .text-slate-200 { color: #334155; /* slate-700 */ }
  .light .text-slate-300 { color: #475569; /* slate-600 */ }
  .light .text-slate-400 { color: #64748b; /* slate-500 */ }
  .light .border-slate-700 { border-color: #cbd5e1; /* slate-300 */ }
  .light .border-slate-700\/50 { border-color: #e2e8f0; /* slate-200 */ }
  .light .border-slate-800 { border-color: #e2e8f0; /* slate-200 */ }
  .light .bg-slate-800\/60 { background-color: #f8fafc; /* slate-50 */ }
  .light .bg-slate-800\/50 { background-color: #f1f5f9; /* slate-100 */ }
  .light .bg-slate-800\/40 { background-color: #f8fafc; /* slate-50 */ }
  .light .bg-slate-800\/30 { background-color: #f1f5f9; /* slate-100 */ }
  .light .bg-slate-800 { background-color: #f1f5f9; }
  .light .bg-slate-700\/60:hover { background-color: #e2e8f0; }
  .light .hover\:bg-slate-700:hover { background-color: #e2e8f0; }
  .light .hover\:bg-slate-800\/60:hover { background-color: #f1f5f9; }
  .light .placeholder-slate-500::placeholder { color: #94a3b8; /* slate-400 */ }
  .light .text-slate-200 { color: #334155; }
  .light .shadow-black\/30 { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05); }
  .light .bg-cyan-500\/10 { background-color: #cffafe; /* cyan-100 */ }
  .light .bg-slate-900 { background-color: #f8fafc; /* slate-50 */ }
</style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }).catch(error => {
            console.log('ServiceWorker registration failed: ', error);
          });
        });
      }
    </script>
  </body>
</html>
