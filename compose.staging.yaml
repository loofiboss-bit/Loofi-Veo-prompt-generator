services:
  veo-staging:
    image: veo-staging:local
    build:
      context: .
      dockerfile: ./Dockerfile
      target: production
      args:
        APP_VERSION: '${APP_VERSION:-dev}'
    environment:
      NODE_ENV: production
      VITE_STAGING: 'true'
    ports:
      - '8080:8080'
    volumes:
      - staging_data:/usr/src/app/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '1.0'
          memory: 256M
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  staging_data:
