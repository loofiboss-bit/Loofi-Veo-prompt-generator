<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veo Prompt Generator</title>
    <link rel="stylesheet" href="./src/shared/styles/tokens.css" />
    <link rel="stylesheet" href="./src/shared/styles/animations.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="theme-color" content="#22d3ee" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://generativelanguage.googleapis.com https://unpkg.com wss: ws:; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; base-uri 'self';"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="./src/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Use relative path and explicit scope for correct origin handling
          navigator.serviceWorker
            .register('./sw.js', { scope: './' })
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch((error) => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
  </body>
</html>
