name: Opt-in Provider Canary

on:
  workflow_dispatch:
    inputs:
      spend_cap_usd:
        description: Hard maximum estimated spend for this one-call canary
        required: true
        default: '0.05'
        type: string

permissions:
  contents: read

jobs:
  gemini-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: provider-canary
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Enforce cap and run one minimal provider call
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_CANARY_API_KEY }}
          CANARY_SPEND_CAP_USD: ${{ inputs.spend_cap_usd }}
        run: node scripts/provider-canary.mjs
