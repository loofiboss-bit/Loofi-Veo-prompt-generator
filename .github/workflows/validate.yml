name: Validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      e2e_mode:
        description: 'E2E mode for manual runs'
        required: false
        default: full
        type: choice
        options:
          - full
          - smoke-only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  governance:
    name: AI Governance Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate agent configuration
        run: bash scripts/validate-agent-config.sh

      - name: Check agent config drift
        run: bash scripts/generate-agent-configs.sh --check

      - name: Check MCP config drift
        run: bash scripts/sync-mcp-configs.sh --check

  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    needs: governance

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Security audit
        run: |
          if [ -f ".audit-allowlist.json" ]; then
            echo "Allowlist found — checking exceptions"
            npm audit --audit-level=high 2>&1 || {
              AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
              echo "$AUDIT_JSON" | node -e "
                const fs = require('fs');
                const allowlist = JSON.parse(fs.readFileSync('.audit-allowlist.json','utf8'));
                const ids = new Set(allowlist.allowedAdvisories.map(a => String(a.id)));
                const now = new Date();
                const expired = allowlist.allowedAdvisories.filter(a => a.expires && new Date(a.expires) < now);
                if (expired.length) { console.error('Expired allowlist entries:', expired.map(a=>a.id)); process.exit(1); }
                let data=''; process.stdin.on('data',d=>data+=d);
                process.stdin.on('end',()=>{
                  try {
                    const audit=JSON.parse(data);
                    const vulns=Object.values(audit.vulnerabilities||{}).filter(v=>v.severity==='high'||v.severity==='critical');
                    const unallowed=vulns.filter(v=>!ids.has(String(v.via?.[0]?.source||'')));
                    if(unallowed.length){console.error('Unallowed vulnerabilities:',unallowed.map(v=>v.name));process.exit(1);}
                    console.log('All high/critical advisories are allowlisted');
                  } catch(e){process.exit(1);}
                });
              " || { echo "::error::Security audit failed — unallowed vulnerabilities found"; exit 1; }
            }
          else
            npm audit --audit-level=high
          fi
        shell: bash

      - name: Lint (strict)
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage gates
        run: npm run test:ci

      - name: Upload coverage summary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          if-no-files-found: error
          retention-days: 7

      - name: Format check
        run: npm run format:check

      - name: Build check
        run: npm run build

  e2e:
    name: E2E Smoke (Dev Server)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E smoke tests
        run: npx playwright test e2e/smoke.spec.ts --project=chromium
        env:
          CI: true

      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: e2e-report
          path: test-results/
          retention-days: 7

  e2e-staging:
    name: E2E Staging (Smoke + Stability)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Prepare script permissions
        run: chmod +x scripts/staging-up.sh scripts/smoke-test.sh

      - name: Start Docker staging
        run: ./scripts/staging-up.sh

      - name: Run smoke suite against staging
        run: ./scripts/smoke-test.sh
        env:
          STAGING_URL: http://localhost:8080

      - name: Run stability suite against staging
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.e2e_mode != 'smoke-only' }}
        run: npx playwright test e2e/stability.spec.ts --project=chromium --reporter=line
        env:
          STAGING_URL: http://localhost:8080
          CI: true

      - name: Upload staging E2E report
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: e2e-staging-report
          path: test-results/
          retention-days: 7

      - name: Capture Docker logs on failure
        if: failure()
        run: docker compose -f compose.staging.yaml logs --no-color > docker-compose.log || true

      - name: Upload Docker logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: e2e-staging-docker-logs
          path: |
            docker-compose.log
            compose.staging.yaml
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop Docker staging
        if: always()
        run: ./scripts/staging-up.sh --down || true
