name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    steps:
      - name: Apply path-based labels
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
