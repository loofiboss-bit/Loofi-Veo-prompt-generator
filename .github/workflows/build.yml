name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    if: github.ref_type != 'tag' || !contains(github.ref_name, '-beta')
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: '*.AppImage'
            artifact_path: 'release/*.AppImage'
          - os: windows-latest
            artifact_name: '*.exe'
            artifact_path: 'release/*.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Lint (strict)
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Format check
        run: npm run format:check

      - name: Build application
        run: npm run build

      - name: Bundle size budget check
        run: |
          MAX_MAIN_KB=800
          MAX_TOTAL_KB=3000
          echo "=== Bundle Size Budget Check ==="
          echo "Main chunk limit: ${MAX_MAIN_KB} KB"
          echo "Total JS limit: ${MAX_TOTAL_KB} KB"

          MAIN_SIZE=$(du -sk dist/assets/index-*.js 2>/dev/null | awk '{total+=$1} END {print total}')
          TOTAL_SIZE=$(du -sk dist/assets/*.js 2>/dev/null | awk '{total+=$1} END {print total}')

          echo "Main chunk: ${MAIN_SIZE} KB"
          echo "Total JS: ${TOTAL_SIZE} KB"

          if [ "$MAIN_SIZE" -gt "$MAX_MAIN_KB" ]; then
            echo "::error::Main chunk (${MAIN_SIZE} KB) exceeds budget (${MAX_MAIN_KB} KB)"
            exit 1
          fi

          if [ "$TOTAL_SIZE" -gt "$MAX_TOTAL_KB" ]; then
            echo "::error::Total JS (${TOTAL_SIZE} KB) exceeds budget (${MAX_TOTAL_KB} KB)"
            exit 1
          fi

          echo "✓ Bundle size within budget"
        shell: bash

      - name: PR changelog validation
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: |
          echo "=== PR Changelog Validation ==="
          # Exceptions: docs-only and internal-only (CI, config) changes
          # Also exempt: Dependabot PRs (automated dependency bumps)
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Check if all changed files are exempt (docs, CI, config)
          NON_EXEMPT=$(echo "$CHANGED_FILES" | grep -vE '^(docs/|\.github/|\.ai/|\.agent/|\.vscode/|\.editorconfig|\.prettier|\.husky/|commitlint|CLAUDE|CODEX|CHATGPT|README|CONTRIBUTING|LICENSE|CHANGELOG|package-lock\.json|package\.json)' || true)

          if [ -z "$NON_EXEMPT" ]; then
            echo "All changes are docs/config-only — changelog update not required."
            exit 0
          fi

          # Check that CHANGELOG.md was modified
          if echo "$CHANGED_FILES" | grep -q '^CHANGELOG.md$'; then
            echo "✓ CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md was not updated. All PRs with code changes must include a changelog entry. Exception: docs-only or CI/config-only changes."
            exit 1
          fi
        shell: bash

      - name: Build Electron app
        run: |
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt ==="
            npm run dist && break
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
        shell: bash
        timeout-minutes: 30
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: false

      - name: List release directory
        run: |
          echo "Contents of release directory:"
          ls -la release/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: veo-studio-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-beta')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          CHANGELOG=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d')
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Veo Studio v${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
