name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    if: github.ref_type != 'tag' || !contains(github.ref_name, '-beta')
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: 'linux-packages'
            artifact_path: |
              release/*.AppImage
              release/*.rpm
          - os: windows-latest
            artifact_name: 'windows-packages'
            artifact_path: |
              release/*-setup.exe
              release/*-setup.exe.blockmap
              release/*-portable.exe
              release/latest*.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Electron binaries
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: |
          if [ -f ".audit-allowlist.json" ]; then
            npm audit --audit-level=high 2>&1 || {
              AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
              echo "$AUDIT_JSON" | node -e "
                const fs=require('fs');
                const al=JSON.parse(fs.readFileSync('.audit-allowlist.json','utf8'));
                const ids=new Set(al.allowedAdvisories.map(a=>String(a.id)));
                const allowedPkgs=new Set(al.allowedAdvisories.map(a=>a.package));
                const now=new Date();
                const expired=al.allowedAdvisories.filter(a=>a.expires&&new Date(a.expires)<now);
                if(expired.length){console.error('Expired:',expired.map(a=>a.id));process.exit(1);}
                let d='';process.stdin.on('data',c=>d+=c);
                process.stdin.on('end',()=>{try{const a=JSON.parse(d);const v=Object.values(a.vulnerabilities||{}).filter(x=>x.severity==='high'||x.severity==='critical');const u=v.filter(x=>{const sources=x.via?.filter(v=>typeof v!=='string').map(v=>String(v.source||''));if(sources&&sources.length>0)return!sources.every(s=>ids.has(s));const transitiveVia=x.via?.filter(v=>typeof v==='string')||[];return!transitiveVia.every(v=>allowedPkgs.has(v));});if(u.length){console.error('Unallowed:',u.map(x=>x.name));process.exit(1);}console.log('Advisories allowlisted');}catch(e){process.exit(1);}});
              " || { echo "::error::Security audit failed"; exit 1; }
            }
          else
            npm audit --audit-level=high
          fi
        shell: bash

      - name: Lint (strict)
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage gates
        run: npm run test:ci

      - name: Format check
        run: npm run format:check

      - name: Build application
        run: npm run build

      - name: Install Linux Electron runtime dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-0

      - name: Electron launch smoke test (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: timeout 45s xvfb-run -a npx electron --no-sandbox . --smoke-test

      - name: Electron launch smoke test (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron . --smoke-test

      - name: Install Playwright Chromium for screenshots
        if: matrix.os == 'ubuntu-latest'
        run: npx playwright install --with-deps chromium

      - name: Capture release screenshots
        if: matrix.os == 'ubuntu-latest'
        run: npm run screenshots

      - name: Bundle size budget check
        run: |
          MAX_MAIN_KB=900
          MAX_TOTAL_KB=3500
          echo "=== Bundle Size Budget Check ==="
          echo "Main chunk limit: ${MAX_MAIN_KB} KB"
          echo "Total JS limit: ${MAX_TOTAL_KB} KB"

          # Find the single largest index-*.js chunk (the actual main entry bundle)
          MAIN_SIZE=$(find dist/assets -maxdepth 1 -type f -name 'index-*.js' -printf '%s\n' | sort -rn | head -1 | awk '{print int(($1 + 1023) / 1024)}')
          TOTAL_SIZE=$(find dist/assets -maxdepth 1 -type f -name '*.js' -printf '%s\n' | awk '{total+=$1} END {print int((total + 1023) / 1024)}')

          echo "Main chunk: ${MAIN_SIZE} KB"
          echo "Total JS: ${TOTAL_SIZE} KB"

          if [ "$MAIN_SIZE" -gt "$MAX_MAIN_KB" ]; then
            echo "::error::Main chunk (${MAIN_SIZE} KB) exceeds budget (${MAX_MAIN_KB} KB)"
            exit 1
          fi

          if [ "$TOTAL_SIZE" -gt "$MAX_TOTAL_KB" ]; then
            echo "::error::Total JS (${TOTAL_SIZE} KB) exceeds budget (${MAX_TOTAL_KB} KB)"
            exit 1
          fi

          echo "✓ Bundle size within budget"
        shell: bash

      - name: Build reproducibility validation
        run: |
          echo "=== Build Reproducibility Check ==="
          # Hash all production JS/CSS assets
          HASH1=$(find dist/assets -type f \( -name '*.js' -o -name '*.css' \) | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "Build 1 hash: $HASH1"

          # Rebuild to verify deterministic output
          rm -rf dist
          npm run build

          HASH2=$(find dist/assets -type f \( -name '*.js' -o -name '*.css' \) | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "Build 2 hash: $HASH2"

          if [ "$HASH1" = "$HASH2" ]; then
            echo "✓ Build is reproducible (hashes match)"
          else
            echo "::warning::Build is NOT reproducible (hashes differ)"
            echo "This may indicate non-deterministic imports or timestamps in output"
          fi
        shell: bash

      - name: PR changelog validation
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        run: |
          echo "=== PR Changelog Validation ==="
          # Exceptions: docs-only and internal-only (CI, config) changes
          # Also exempt: Dependabot PRs (automated dependency bumps)
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Check if all changed files are exempt (docs, CI, config)
          NON_EXEMPT=$(echo "$CHANGED_FILES" | grep -vE '^(docs/|\.github/|\.ai/|\.agent/|\.vscode/|\.editorconfig|\.prettier|\.husky/|commitlint|CLAUDE|CODEX|CHATGPT|README|CONTRIBUTING|LICENSE|CHANGELOG|package-lock\.json|package\.json)' || true)

          if [ -z "$NON_EXEMPT" ]; then
            echo "All changes are docs/config-only — changelog update not required."
            exit 0
          fi

          # Check that CHANGELOG.md was modified
          if echo "$CHANGED_FILES" | grep -q '^CHANGELOG.md$'; then
            echo "✓ CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md was not updated. All PRs with code changes must include a changelog entry. Exception: docs-only or CI/config-only changes."
            exit 1
          fi
        shell: bash

      - name: Build Electron app
        run: |
          success=false
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt ==="
            if npm run dist -- --publish never; then
              success=true
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Attempt $attempt failed, retrying in 15s..."
              sleep 15
            fi
          done

          if [ "$success" != "true" ]; then
            echo "::error::Electron packaging failed after 3 attempts"
            exit 1
          fi
        shell: bash
        timeout-minutes: 30
        env:
          USE_HARD_LINKS: false
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Verify packaged artifacts
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              ls release/Loofi-Flow-Veo-Studio-*-linux-*.AppImage
              ls release/Loofi-Flow-Veo-Studio-*-linux-*.rpm
              ;;
            windows-latest)
              ls release/Loofi-Flow-Veo-Studio-*-win-*-setup.exe
              ls release/Loofi-Flow-Veo-Studio-*-win-*-setup.exe.blockmap
              ls release/Loofi-Flow-Veo-Studio-*-win-*-portable.exe
              test -f release/latest*.yml
              ;;
          esac
        shell: bash

      - name: Packaged Electron E2E (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npx playwright test e2e/packaged-electron.spec.ts --project=chromium
        env:
          PACKAGED_ELECTRON_PATH: release/linux-unpacked/veo-prompt-generator

      - name: Packaged Electron E2E (Windows)
        if: matrix.os == 'windows-latest'
        run: npx playwright test e2e/packaged-electron.spec.ts --project=chromium
        env:
          PACKAGED_ELECTRON_PATH: release/win-unpacked/Loofi Flow Veo Studio.exe

      - name: List release directory
        run: |
          echo "Contents of release directory:"
          ls -la release/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: veo-studio-${{ matrix.os }}
          path: |
            ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload screenshots
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-screenshots
          path: assets/screenshots/
          if-no-files-found: error

  package-smoke-fedora:
    name: Fedora install / launch / uninstall
    needs: build
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Install smoke-test tools
        run: dnf install -y findutils xorg-x11-server-Xvfb dbus-x11 libxcrypt-compat fuse-libs weston

      - name: Download Linux packages
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: veo-studio-ubuntu-latest
          path: artifacts

      - name: Test RPM install, X11 launch, and uninstall
        run: |
          RPM=$(find artifacts -name '*.rpm' -print -quit)
          test -n "$RPM"
          dnf install -y "$RPM"
          EXE=/usr/bin/veo-prompt-generator
          test -x "$EXE"
          xvfb-run -a "$EXE" --no-sandbox --smoke-test
          PACKAGE=$(rpm -qp --queryformat '%{NAME}' "$RPM")
          dnf remove -y "$PACKAGE"
          ! rpm -q "$PACKAGE"

      - name: Test Wayland launch and secret-service session
        run: |
          RPM=$(find artifacts -name '*.rpm' -print -quit)
          dnf install -y "$RPM"
          EXE=/usr/bin/veo-prompt-generator
          test -x "$EXE"
          export XDG_RUNTIME_DIR=/tmp/loofi-runtime
          install -d -m 700 "$XDG_RUNTIME_DIR"
          dbus-run-session -- sh -eu -c '
            weston --backend=headless-backend.so --socket=wayland-loofi --idle-time=0 >/tmp/weston.log 2>&1 &
            WESTON_PID=$!
            trap "kill $WESTON_PID" EXIT
            sleep 3
            WAYLAND_DISPLAY=wayland-loofi "'$EXE'" --no-sandbox --ozone-platform=wayland --enable-features=UseOzonePlatform --smoke-test
          '

      - name: Test AppImage extraction and X11 launch
        run: |
          APPIMAGE=$(find artifacts -name '*.AppImage' -print -quit)
          test -n "$APPIMAGE"
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract >/dev/null
          xvfb-run -a ./squashfs-root/AppRun --no-sandbox --smoke-test

  package-smoke-windows:
    name: Windows install / portable / uninstall
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download Windows packages
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: veo-studio-windows-latest
          path: artifacts

      - name: Test NSIS install, shortcuts, launch, and uninstall
        shell: pwsh
        run: |
          $setup = Get-ChildItem artifacts -Recurse -Filter '*-setup.exe' | Select-Object -First 1
          if (-not $setup) { throw 'NSIS installer not found' }
          Start-Process $setup.FullName -ArgumentList '/S' -Wait
          $app = Get-ChildItem "$env:LOCALAPPDATA\Programs" -Recurse -Filter 'Loofi Flow Veo Studio.exe' | Select-Object -First 1
          if (-not $app) { throw 'Installed executable not found' }
          if (-not (Test-Path "$env:APPDATA\Microsoft\Windows\Start Menu\Programs\Loofi Flow Veo Studio.lnk")) { throw 'Start Menu shortcut missing' }
          if (-not (Test-Path "$env:USERPROFILE\Desktop\Loofi Flow Veo Studio.lnk")) { throw 'Desktop shortcut missing' }
          $process = Start-Process $app.FullName -ArgumentList '--smoke-test' -PassThru -Wait
          if ($process.ExitCode -ne 0) { throw "Installed smoke test failed: $($process.ExitCode)" }
          $uninstaller = Get-ChildItem $app.DirectoryName -Filter 'Uninstall*.exe' | Select-Object -First 1
          if (-not $uninstaller) { throw 'Uninstaller not found' }
          Start-Process $uninstaller.FullName -ArgumentList '/S' -Wait
          if (Test-Path $app.FullName) { throw 'Installed executable remained after uninstall' }

      - name: Test portable launch
        shell: pwsh
        run: |
          $portable = Get-ChildItem artifacts -Recurse -Filter '*-portable.exe' | Select-Object -First 1
          if (-not $portable) { throw 'Portable executable not found' }
          $process = Start-Process $portable.FullName -ArgumentList '--smoke-test' -PassThru -Wait
          if ($process.ExitCode -ne 0) { throw "Portable smoke test failed: $($process.ExitCode)" }

  release:
    name: Create Release
    needs: [build, package-smoke-fedora, package-smoke-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-beta')
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependency graph for SBOM
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Generate combined SHA256 checksums
        run: |
          find artifacts -type f \( \
            -name '*.AppImage' -o \
            -name '*.rpm' -o \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name 'latest*.yml' \
          \) -print0 | while IFS= read -r -d '' artifact; do
            hash=$(sha256sum "$artifact" | awk '{print $1}')
            printf '%s  %s\n' "$hash" "$(basename "$artifact")"
          done | sort -k2 > artifacts/SHA256SUMS.txt
          test -s artifacts/SHA256SUMS.txt
          cat artifacts/SHA256SUMS.txt

      - name: Generate CycloneDX SBOM and release manifest
        run: |
          npm sbom --sbom-format cyclonedx > artifacts/sbom.cdx.json
          node -e "const fs=require('fs');const manifest={schemaVersion:1,version:process.env.GITHUB_REF_NAME.replace(/^v/,''),commit:process.env.GITHUB_SHA,createdAt:new Date().toISOString(),checksums:'SHA256SUMS.txt',sbom:'sbom.cdx.json',signed:process.env.WINDOWS_SIGNED==='true'};fs.writeFileSync('artifacts/release-manifest.json',JSON.stringify(manifest,null,2))"
        env:
          WINDOWS_SIGNED: ${{ secrets.WINDOWS_CERTIFICATE != '' }}

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.exe

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          CHANGELOG=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d')
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Veo Studio v${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.exe
            artifacts/**/*.blockmap
            artifacts/**/latest*.yml
            artifacts/SHA256SUMS.txt
            artifacts/sbom.cdx.json
            artifacts/release-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
