<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veo Prompt Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#22d3ee" />
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.22.0"
  }
}
</script>
<style>
  body {
    background-color: #020617; /* slate-950 */
    background-image: radial-gradient(circle at top, hsla(210, 40%, 15%, 0.8), transparent 50%),
                      radial-gradient(circle at bottom left, hsla(180, 50%, 20%, 0.6), transparent 60%),
                      radial-gradient(circle at bottom right, hsla(240, 40%, 18%, 0.7), transparent 70%);
  }
  @keyframes flash-border {
    0% { border-color: #1e293b; } /* slate-800 */
    50% { border-color: #22d3ee; } /* cyan-400 */
    100% { border-color: #1e293b; } /* slate-800 */
  }
  .animate-flash-border {
    animation: flash-border 0.6s ease-in-out;
  }
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(1rem);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.5s ease-out forwards;
  }
</style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }).catch(error => {
            console.log('ServiceWorker registration failed: ', error);
          });
        });
      }
    </script>
  </body>
</html>
