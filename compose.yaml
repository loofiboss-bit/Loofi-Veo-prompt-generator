services:
  veopromptgenerator:
    image: veopromptgenerator:latest
    build:
      context: .
      dockerfile: ./Dockerfile
      target: production
      cache_from:
        - type=registry,ref=veopromptgenerator:buildcache
    environment:
      NODE_ENV: production
    ports:
      - '8080:8080'

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '1.0'
          memory: 256M

    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped

    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
