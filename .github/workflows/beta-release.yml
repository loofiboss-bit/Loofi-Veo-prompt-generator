name: Beta Release

on:
  push:
    tags:
      - "v*-beta*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Beta version (e.g., 1.4.0-beta.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Beta on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: "*.AppImage"
            artifact_path: "release/*.AppImage"
          - os: windows-latest
            artifact_name: "*.exe"
            artifact_path: "release/*.exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Electron app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          USE_HARD_LINKS: false

      - name: List release directory
        run: |
          echo "Contents of release directory:"
          ls -la release/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: veo-studio-beta-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create Beta Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Extract version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Beta version: $VERSION"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          # Try to extract changelog, fallback to generic message if not found
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            CHANGELOG=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d')
          else
            CHANGELOG="## Beta Release v$VERSION\n\nThis is a beta release for testing new features before they reach stable.\n\n### ⚠️ Beta Warning\n\nBeta releases may contain bugs and incomplete features. Use at your own risk and please report any issues you encounter.\n\n### Installation\n\nDownload the appropriate file for your platform:\n- **Linux**: \`.AppImage\` file\n- **Windows**: \`.exe\` installer\n\nFor full changelog, see [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Beta Release
        uses: softprops/action-gh-release@v1
        with:
          name: Veo Studio v${{ steps.get_version.outputs.VERSION }} (Beta)
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord (Optional)
        if: success()
        run: |
          echo "Beta release v${{ steps.get_version.outputs.VERSION }} created successfully!"
          # Add Discord webhook notification here if needed
          # curl -X POST -H 'Content-Type: application/json' \
          #   -d '{"content": "🚀 New beta release v${{ steps.get_version.outputs.VERSION }} is available!"}' \
          #   ${{ secrets.DISCORD_WEBHOOK_URL }}
