version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    reviewers:
      - 'loofitheboss'
    labels:
      - 'dependencies'
    groups:
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      electron:
        patterns:
          - 'electron'
          - 'electron-builder'
      testing:
        patterns:
          - 'vitest'
          - '@testing-library/*'
          - 'jsdom'
      linting:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'prettier'
          - '@commitlint/*'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'ci'
    commit-message:
      prefix: 'ci(deps)'
