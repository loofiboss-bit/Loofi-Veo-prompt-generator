name: Beta Release

on:
  push:
    tags:
      - 'v*-beta*'

permissions:
  contents: read

jobs:
  build:
    name: Build Beta on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_pattern: '*.AppImage'
          - os: windows-latest
            platform: windows
            artifact_pattern: '*.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Electron binaries
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron
            ~/AppData/Local/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}-v2
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: |
          if [ -f ".audit-allowlist.json" ]; then
            npm audit --audit-level=high 2>&1 || {
              AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
              echo "$AUDIT_JSON" | node -e "
                const fs=require('fs');
                const al=JSON.parse(fs.readFileSync('.audit-allowlist.json','utf8'));
                const ids=new Set(al.allowedAdvisories.map(a=>String(a.id)));
                let d='';process.stdin.on('data',c=>d+=c);
                process.stdin.on('end',()=>{try{const a=JSON.parse(d);const v=Object.values(a.vulnerabilities||{}).filter(x=>x.severity==='high'||x.severity==='critical');const u=v.filter(x=>!ids.has(String(x.via?.[0]?.source||'')));if(u.length){console.error('Unallowed:',u.map(x=>x.name));process.exit(1);}console.log('Advisories allowlisted');}catch(e){process.exit(1);}});
              " || { echo "::error::Security audit failed"; exit 1; }
            }
          else
            npm audit --audit-level=high
          fi
        shell: bash

      - name: Lint (strict)
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Format check
        run: npm run format:check

      - name: Clear Vite cache
        run: |
          rm -rf node_modules/.vite
          echo "Vite cache cleared"
        shell: bash

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist -- --publish never
        env:
          USE_HARD_LINKS: false

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist -- --publish never
        env:
          USE_HARD_LINKS: false
        shell: pwsh

      - name: List release directory
        run: |
          echo "Contents of release directory:"
          ls -la release/
        shell: bash

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: veo-studio-beta-linux
          path: release/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: veo-studio-beta-windows
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create Beta Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: |
          echo "Downloaded artifacts:"
          ls -R artifacts

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Beta version: $VERSION"

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}

          # Try to extract changelog section for this version
          CHANGELOG=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' 2>/dev/null || echo "")

          if [ -z "$CHANGELOG" ]; then
            # Fallback: generate from recent commits
            CHANGELOG="## Beta Release v${VERSION}

          ### Changes

          $(git log $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~10)..HEAD --oneline --no-decorate | head -20 | sed 's/^/- /')

          ---

          **This is a BETA release for testing purposes.**
          Report issues at: https://github.com/${{ github.repository }}/issues
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details."
          fi

          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Build Info:** v${VERSION} | $(date -u +'%Y-%m-%d %H:%M UTC') | ${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Beta Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: 'Veo Studio v${{ steps.get_version.outputs.VERSION }} (Beta)'
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: true
          overwrite_files: true
          files: |
            artifacts/veo-studio-beta-linux/*.AppImage
            artifacts/veo-studio-beta-windows/*.exe
            artifacts/veo-studio-beta-windows/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: success()
        run: |
          echo "✅ Beta release v${{ steps.get_version.outputs.VERSION }} created successfully!"
          echo ""
          echo "📦 Artifacts uploaded:"
          ls -lh artifacts/veo-studio-beta-linux/ 2>/dev/null || echo "  No Linux artifacts"
          ls -lh artifacts/veo-studio-beta-windows/ 2>/dev/null || echo "  No Windows artifacts"
          echo ""
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.VERSION }}"
